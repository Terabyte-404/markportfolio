<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #1a1a2e; color: white; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; padding: 20px; background: #16213e; border-radius: 8px; margin-bottom: 20px; }
        .nav { background: #0f3460; padding: 10px; text-align: center; border-radius: 4px; margin-bottom: 20px; }
        .projects { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .project { background: #16213e; padding: 20px; border-radius: 8px; text-align: center; }
        h1 { color: #4a7c7e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MARK NJOROGE</h1>
            <p>Web Developer Portfolio</p>
        </div>
        <div class="nav">
            <p>Home | About | Projects | Contact</p>
        </div>
        <div class="projects">
            <div class="project">
                <h3>Portfolio Website</h3>
                <p>Full-stack React application</p>
            </div>
            <div class="project">
                <h3>Weather Dashboard</h3>
                <p>Interactive weather app</p>
            </div>
            <div class="project">
                <h3>Blog API</h3>
                <p>RESTful API service</p>
            </div>
        </div>
    </div>
</body>
</html>
